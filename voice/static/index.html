<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareLoop — Voice Healthcare Concierge</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <span class="logo" aria-hidden="true"><span class="loop-mark"><span></span></span></span>
        <div>
          <h1>CareLoop</h1>
          <p class="tag">Care navigation by voice or text</p>
        </div>
      </div>
      <div class="controls">
        <a href="/dashboard" class="navbtn" title="Open the project dashboard" aria-label="Open project dashboard">Dashboard</a>
        <button id="largeTextToggle" class="icon-toggle" type="button" aria-label="Use large text" aria-pressed="false" title="Large text">
          <span aria-hidden="true">Aa</span>
        </button>
        <button id="contrastToggle" class="icon-toggle" type="button" aria-label="Use high contrast" aria-pressed="false" title="High contrast">
          <span aria-hidden="true">HC</span>
        </button>
        <button id="newChat" class="newchat" type="button" title="Start a new conversation" aria-label="Start a new conversation">New</button>
        <label for="lang">Language</label>
        <select id="lang" title="Deepgram Nova-3 multilingual" aria-label="Speech recognition language">
          <option value="multi" selected>Auto (multilingual)</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="zh">Chinese</option>
          <option value="hi">Hindi</option>
          <option value="fr">French</option>
        </select>
      </div>
    </header>

    <div id="srUpdates" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <div id="chat" class="chat" role="log" aria-label="CareLoop conversation">
      <div class="msg bot">
        <div class="bubble">
          Hi, I'm <b>CareLoop</b>. Tell me what's going on, who it is for, and where to search.
          <div class="note">Not medical advice. For an emergency, call 911.</div>
        </div>
      </div>
      <div class="prompt-chips" aria-label="Example prompts">
        <button type="button" data-prompt="My dad has a bad cough and fever">My dad has a bad cough and fever</button>
        <button type="button" data-prompt="Find a cardiologist near me">Find a cardiologist near me</button>
        <button type="button" data-prompt="My mom was diagnosed with diabetes">My mom was diagnosed with diabetes</button>
        <button type="button" data-prompt="I have chest pain">I have chest pain</button>
      </div>
    </div>

    <div class="composer" role="form" aria-label="Send CareLoop a message">
      <button id="mic" class="mic" type="button" title="Click to talk" aria-label="Start voice recording">
        <span class="mic-icon" aria-hidden="true"></span>
        <span class="voice-meter" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </span>
        <span class="mic-label">Speak</span>
      </button>
      <div class="text-row">
        <input id="textInput" type="text" placeholder="Type a message" aria-label="Type a message" />
        <button id="sendBtn" type="button" aria-label="Send message">Send</button>
      </div>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div id="stats" class="stats-line"></div>
    <footer>
      <span id="via" class="via"></span>
      <span class="legal">CareLoop is a navigation aid, not a medical provider. Provider data: CMS NPPES.</span>
    </footer>
  </div>

  <audio id="player" hidden></audio>
  <script src="/static/app.js"></script>
</body>
</html>
